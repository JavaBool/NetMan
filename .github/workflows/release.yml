name: Release All Platforms

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-server:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux Server Dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libxdo-dev libxkbcommon-dev libwayland-dev libdbus-1-dev libpipewire-0.3-dev libegl1-mesa-dev libgl1-mesa-dev libgbm-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-xcb-dev libspa-0.2-dev
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Build Server
        working-directory: ./server
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: |
            server/target/${{ matrix.target }}/release/server.exe
            server/target/${{ matrix.target }}/release/server

  build-client-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Linux Client Dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev          
      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm install
        
      - name: Build Tauri Desktop Client
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./client
          tagName: v__VERSION__
          releaseName: "NetMan v__VERSION__"
          releaseBody: "Automated Release Builds"
          releaseDraft: true
          prerelease: false

  build-client-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Rust with Android Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android
          
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Android NDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV
          
      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm install
        
      - name: Build Android APK
        working-directory: ./client
        run: npm run tauri android build -- --apk
        
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: client-android-apk
          path: client/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
